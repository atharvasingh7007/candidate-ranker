# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini for architecture discussion and code scaffolding.
  All scoring logic, feature engineering, and ranking decisions were
  designed and validated by the team. No candidate data was fed to any LLM
  during the ranking step.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-stage ranking pipeline with semantic understanding and behavioral signals.
  Stage 1: Coarse filter (services-only gate, experience band, minimum technical signal).
  Stage 2: Honeypot detection via statistical anomaly checks (experience-tenure mismatch,
  skill inflation, assessment paradox, timeline impossibilities).
  Stage 3: Feature engineering across 6 dimensions (skills match with endorsement/duration
  trust, career trajectory with product-company detection, semantic similarity via
  sentence-transformers embeddings, experience Gaussian fit, location scoring, education).
  Anti-pattern scoring penalizes title-chasers, CV/speech-only, consulting-only careers.
  Stage 4: Behavioral multiplier from 23 Redrob signals (recency, response rate, GitHub,
  notice period, availability). Stage 5: XGBoost pairwise ranking model trained on
  programmatically generated preference pairs, with SHAP-derived reasoning.
  Runtime: ~30 seconds on CPU for 100K candidates.

